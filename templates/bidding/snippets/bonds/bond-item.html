{% load i18n %}

<a href="{% url 'bidding_bid_details' bid.id %}"
       class="text-decoration-none text-reset">
    <div class="d-flex p-2">

        <div class="flex-grow-1">
            <span>{{ bid.company.name|default:'-' }}</span>
        </div>

        <div class="text-end">
            <span class="fw-bold">{{ bid.bond_amount|default:'-' }}</span>
        </div>

    </div>
</a>
